# Defaults for CARLBipedalWalker experiments (bonus environment, not required
# by the proposal). Needs the box2d extra, same as lunarlander - see README.
# Continuous 4D action, richer/harder locomotion task than LunarLander, so a
# longer training budget than the other bonus envs.
total_timesteps: 750000
n_envs: 8
n_contexts: 50
eval_freq: 50000
eval_episodes_per_context: 3

ppo:
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5

signal_params:
  ema_alpha: 0.3
  hard_std_factor: 1.0
  patience: 3

policy_params:
  floor: 0.02
  downweight_factor: 0.3
  cooldown: 8
  temperature: 1.0
  uniform_mix: 0.05
